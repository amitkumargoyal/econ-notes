project:
  type: website
  output-dir: _site

website:
  title: "Econ Notes"
  description: "Microeconomics teaching notes — a companion to Econschool videos."
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: consumer-theory/index.qmd
        text: Consumer Theory
  page-footer:
    center: |
      [Amit Goyal](https://econschool.in) · <amit@econschool.in> · [econschool.in](https://econschool.in)

format:
  html:
    theme:
      - litera
      - brand.scss
    toc: true
    toc-depth: 3
    css: styles.css
    html-math-method: mathjax
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

execute:
  freeze: auto
